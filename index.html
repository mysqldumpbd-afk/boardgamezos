<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="theme-color" content="#07070F"/>

  <title>BOARDGAMEZ OS</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Exo+2:wght@400;700;900&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet"/>

  <!-- Anime.js v3 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.2/anime.min.js"></script>

  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;overflow:hidden;background:#07070F}
    #root{height:100dvh}

    #splash{
      position:fixed;inset:0;z-index:99999;
      background:#07070F;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      pointer-events:none;
    }
    .sp-letters{display:flex;gap:1px;margin-bottom:4px}
    .sp-letter{
      font-family:'Black Ops One',cursive;
      font-size:clamp(2.2rem,9vw,3.4rem);
      letter-spacing:1px;
      opacity:0;
      transform:translateY(24px);
      display:inline-block;
    }
    .sp-letter.board{
      background:linear-gradient(160deg,#00F5FF 0%,#7DF9FF 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      filter:drop-shadow(0 0 14px rgba(0,245,255,.55));
    }
    .sp-letter.gamez{
      background:linear-gradient(160deg,#FF8C00 0%,#FF6B35 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      filter:drop-shadow(0 0 14px rgba(255,107,53,.55));
    }
    .sp-space{width:.6em}
    .sp-sub{
      font-family:'Orbitron',monospace;
      font-size:.58rem;letter-spacing:7px;
      color:rgba(0,245,255,.35);
      margin-bottom:34px;
      opacity:0;
    }
    .sp-track{
      width:min(240px,65vw);height:2px;
      background:rgba(255,255,255,.07);
      border-radius:2px;overflow:hidden;
      opacity:0;
    }
    .sp-fill{
      height:100%;width:0%;
      background:linear-gradient(90deg,#00F5FF,#9B5DE5,#FF6B35);
      border-radius:2px;
      transition:width .45s cubic-bezier(.4,0,.2,1);
    }
    .sp-msg{
      font-family:'Orbitron',monospace;
      font-size:.5rem;letter-spacing:3px;
      color:rgba(255,255,255,.18);
      margin-top:12px;height:1em;
      opacity:0;
    }
    .sp-dots{display:flex;gap:9px;margin-top:22px;opacity:0}
    .sp-dot{width:6px;height:6px;border-radius:50%;background:rgba(0,245,255,.25)}
  </style>

  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

<div id="splash">
  <div class="sp-letters">
    <span class="sp-letter board">B</span>
    <span class="sp-letter board">O</span>
    <span class="sp-letter board">A</span>
    <span class="sp-letter board">R</span>
    <span class="sp-letter board">D</span>
    <span class="sp-space"></span>
    <span class="sp-letter gamez">G</span>
    <span class="sp-letter gamez">A</span>
    <span class="sp-letter gamez">M</span>
    <span class="sp-letter gamez">E</span>
    <span class="sp-letter gamez">Z</span>
  </div>
  <div class="sp-sub">OS · v2.0</div>
  <div class="sp-track"><div class="sp-fill" id="spFill"></div></div>
  <div class="sp-msg"  id="spMsg">INICIANDO...</div>
  <div class="sp-dots">
    <div class="sp-dot"></div>
    <div class="sp-dot"></div>
    <div class="sp-dot"></div>
  </div>
</div>

<div id="root"></div>

<script>
(function(){
  // ── SPLASH CONTROLLER ──────────────────────────────────────────
  var fill  = null;
  var msg   = null;
  var steps = [
    [12, 'FIREBASE...'],
    [28, 'MOTOR DE JUEGO...'],
    [46, 'HERRAMIENTAS...'],
    [60, 'STRIKE...'],
    [72, 'PARTIDAS...'],
    [82, 'RUNTIME...'],
    [90, 'INTERFAZ...'],
    [96, 'BUILDER...'],
  ];
  var done  = false;

  function getEls(){ fill = document.getElementById('spFill'); msg = document.getElementById('spMsg'); }

  window._splashStep = function(idx){
    if(done) return;
    getEls();
    if(idx < steps.length){
      var s = steps[idx];
      if(fill) fill.style.width = s[0] + '%';
      if(msg)  msg.textContent  = s[1];
    }
  };

  window._splashDone = function(){
    if(done) return;
    done = true;
    getEls();
    var splash = document.getElementById('splash');
    if(!splash) return;
    if(fill) fill.style.width = '100%';
    if(msg)  msg.textContent  = 'LISTO';

    var go = function(){
      if(window.anime){
        window.anime({
          targets: splash,
          opacity: [1, 0],
          duration: 520,
          delay: 120,
          easing: 'easeInQuart',
          complete: function(){ if(splash.parentNode) splash.parentNode.removeChild(splash); }
        });
      } else {
        splash.style.transition = 'opacity .5s';
        splash.style.opacity = '0';
        setTimeout(function(){ if(splash.parentNode) splash.parentNode.removeChild(splash); }, 550);
      }
    };

    // Short pause so "LISTO" is visible
    setTimeout(go, 200);
  };

  // ── REACT-MOUNT WATCHER ───────────────────────────────────────
  // text/babel onload is unreliable — watch #root for React children instead
  var watchInterval = null;
  var watchStart    = Date.now();
  var MAX_WAIT      = 30000; // 30s hard cap

  function startWatch(){
    watchInterval = setInterval(function(){
      var root = document.getElementById('root');
      // React has mounted when #root has child elements
      if(root && root.children.length > 0){
        clearInterval(watchInterval);
        window._splashDone();
      }
      // Hard timeout fallback
      if(Date.now() - watchStart > MAX_WAIT){
        clearInterval(watchInterval);
        window._splashDone();
      }
    }, 80);
  }

  // Start watching after DOM is ready
  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', startWatch);
  } else {
    startWatch();
  }

  // ── ANIME.JS INTRO (runs after anime loads) ───────────────────
  function runIntro(){
    if(!window.anime){ setTimeout(runIntro, 60); return; }
    var a = window.anime;

    // Letters stagger in
    a({ targets:'.sp-letter', opacity:[0,1], translateY:[24,0],
        delay: a.stagger(48), duration:520, easing:'easeOutExpo' });

    // Sub + track + msg + dots
    a({ targets:'.sp-sub', opacity:[0,1], translateY:[8,0],
        delay:360, duration:500, easing:'easeOutExpo' });
    a({ targets:'.sp-track,.sp-msg,.sp-dots', opacity:[0,1],
        delay:500, duration:460, easing:'easeOutExpo' });

    // Dots pulse
    a({ targets:'.sp-dot', scale:[.6,1.3],
        loop:true, direction:'alternate',
        duration:550, easing:'easeInOutSine',
        delay: a.stagger(140) });
  }
  runIntro();

})();
</script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<!-- React 18 -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

<!-- Babel -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- Cambios nuevo motor -->
<script src="./engine-schema.js"></script>
<script src="./schema-utils.js"></script>
<script src="./runtime-resolver.js"></script>
<script src="./official-presets.js"></script>


<!-- Globals -->
<script src="app.js"               onload="_splashStep(0)"></script>
<script src="config-interpreter.js" onload="_splashStep(1)"></script>

<!-- JSX — Babel compila; onload no es confiable en text/babel pero
     igual actualizamos el progreso como best-effort -->
<script type="text/babel" src="tools.jsx"     ></script>
<script type="text/babel" src="strike.jsx"    ></script>
<script type="text/babel" src="generic.jsx"   ></script>
<script type="text/babel" src="runtime.jsx"   ></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="boardgamez-motor-diagrama.jsx"></script>
  <script type="text/babel" src="builder.jsx"   ></script>

<!-- Cambios nuevo builder -->
<script type="text/babel" src="./builder-vnext.jsx"></script>


<!-- Service Worker -->
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('/boardgamezos/sw.js')
      .catch(function(e){ /* silent */ });
  });
}
</script>

</body>
</html>
